# ==============================================================================
# Phase 5 — docker-compose.yml: Secure Container Setup & Orchestration
# ==============================================================================

version: '3.8'

services:
  nids-dashboard:
    build:
      context: .
      target: runner
    container_name: nids-dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      # Enforce standard crisp Streamlit Light theme inside container environment
      - STREAMLIT_THEME_BASE=light
      - STREAMLIT_THEME_PRIMARYCOLOR=#4f46e5
      - STREAMLIT_THEME_BACKGROUNDCOLOR=#f8fafc
      - STREAMLIT_THEME_SECONDARYBACKGROUNDCOLOR=#f1f5f9
      - STREAMLIT_THEME_TEXTCOLOR=#1e293b
    restart: unless-stopped
    
    # ── Security & Resource Limits (Mitigate Exhaustion & Exploits) ──
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1500M
        reservations:
          cpus: '0.5'
          memory: 512M
          
    # Persistent mount point for cryptographically signed model files
    volumes:
      - ./models/saved:/app/models/saved:rw
